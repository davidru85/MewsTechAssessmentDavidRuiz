name: CI

# Assessment-appropriate continuous integration: keep `main` always buildable
# and demoable by verifying every pull request (and every push to main) builds
# the mock flavor and passes unit tests on JDK 17.
# See CI_CD.md for the strategy and the future production CD path.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (mock, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 is required — Gradle 8.9 fails on newer JDKs (see MEMORY.md).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mock flavor
        run: ./gradlew :app:assembleMockDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          if-no-files-found: ignore
          retention-days: 7
