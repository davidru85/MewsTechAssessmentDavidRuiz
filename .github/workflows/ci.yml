name: CI

# Assessment-appropriate continuous integration: keep `main` always buildable
# and demoable. Every pull request (and every push to main) must pass the
# architecture guardrails, static analysis (ktlint + detekt), build the mock
# flavor, and pass unit tests on JDK 17.
# See CI_CD.md for the strategy and the future production CD path.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (mock, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Fast, JDK-free guardrail: domain purity + no cross-feature imports.
      # No-op until the first feature module exists, then auto-activates.
      - name: Architecture rules
        run: ./scripts/check-architecture.sh

      # JDK 17 is pinned for build reproducibility (see MEMORY.md / CI_CD.md).
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Static analysis (ktlint + detekt)
        run: ./gradlew ktlintCheck detekt --stacktrace

      - name: Build mock flavor
        run: ./gradlew :app:assembleMockDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: |
            **/build/reports/tests/
            **/build/reports/ktlint/
            **/build/reports/detekt/
          if-no-files-found: ignore
          retention-days: 7
