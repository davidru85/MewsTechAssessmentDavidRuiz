name: Release (CD scaffold)

# SCAFFOLD ONLY — manual trigger, never runs automatically, so it cannot break CI.
# This documents the future production continuous-delivery path described in
# CI_CD.md. The signing + distribution steps are intentionally gated behind
# repository secrets and skip cleanly until those secrets (and a real feature
# slice + `live` data source) exist. See ROADMAP.md Phase 2+.

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Distribution track"
        type: choice
        default: internal
        options: [internal, closed, production]

permissions:
  contents: read

jobs:
  release:
    name: Build signed release (mock-safe scaffold)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Until live signing config exists, build the unsigned mock release so the
      # pipeline is exercisable end-to-end without secrets.
      - name: Assemble release (placeholder until signing is configured)
        run: ./gradlew :app:assembleMockRelease --stacktrace

      - name: Decode signing keystore
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "TODO: decode keystore to a temp file and reference it from a live signingConfig"

      - name: Build signed live release
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "TODO: ./gradlew :app:bundleLiveRelease with signing env wired in"

      - name: Upload to Play Console internal track
        if: ${{ env.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "TODO: upload the signed AAB to the '${{ inputs.track }}' track (e.g. r0adkll/upload-google-play)"
